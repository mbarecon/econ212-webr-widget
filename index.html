<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webR Dashboard</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text-color: #efefef;
            --accent: #3a7bd5;
            --border: #444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-grow: 1;
            gap: 1px;
            background: var(--border);
            overflow: hidden;
        }
        .panel {
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow: auto;
        }
        textarea {
            flex-grow: 1;
            background: #121212;
            color: #9cdcfe;
            border: 1px solid var(--border);
            padding: 1rem;
            font-family: "Fira Code", monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        #run-btn { background: #4caf50; color: white; }
        #clear-btn { background: #f44336; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #console-output {
            background: #000;
            color: #00ff00;
            padding: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            flex: 1;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        #plot-output {
            background: white;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }
        canvas { max-width: 100%; height: auto !important; }
        .status { font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

<header>
    <strong>webR Interface</strong>
    <div id="status" class="status">Initializing webR (loading ~25MB)...</div>
</header>

<div class="main-layout">
    <div class="panel">
        <textarea id="editor" spellcheck="false"># Insert your code here
# Example:
# data <- read.csv("your_file.csv")
# plot(rnorm(100), col="blue", pch=19)</textarea>
        <div class="controls">
            <button id="run-btn" disabled>Run Code</button>
            <button id="clear-btn">Clear</button>
            <input type="file" id="file-upload" style="display:none">
            <button onclick="document.getElementById('file-upload').click()" style="background:var(--panel-bg); color:white;">Upload Data</button>
        </div>
    </div>

    <div class="panel">
        <div id="console-output">R Console...</div>
        <div id="plot-output">
            <canvas id="canvas" width="500" height="400"></canvas>
        </div>
    </div>
</div>

<script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    const webR = new WebR();
    const runBtn = document.getElementById('run-btn');
    const clearBtn = document.getElementById('clear-btn');
    const output = document.getElementById('console-output');
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');

    // 1. Initialize webR
    async function init() {
        await webR.init();
        status.innerText = "webR Ready";
        runBtn.disabled = false;
        
        // Set up the graphics device to point to our canvas
        await webR.evalRVoid('canvas(width=500, height=400)');
    }
    init();

    // 2. Run Code Logic
    runBtn.onclick = async () => {
        const code = editor.value;
        runBtn.disabled = true;
        
        try {
            // Capture console output
            const shelter = await new webR.Shelter();
            const result = await shelter.evalR(code);
            const outputText = await result.toJs();
            
            if (outputText && outputText.values) {
                output.innerText += `\n> ${code}\n${outputText.values}`;
            }
        } catch (err) {
            output.innerText += `\nError: ${err.message}`;
        } finally {
            runBtn.disabled = false;
            output.scrollTop = output.scrollHeight;
        }
    };

    // 3. Clear Logic
    clearBtn.onclick = async () => {
        editor.value = "# Insert your code here";
        output.innerText = "R Console...";
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Clear R Global Environment
        await webR.evalRVoid("rm(list = ls())");
    };

    // 4. File Upload Logic
    document.getElementById('file-upload').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            const data = new Uint8Array(event.target.result);
            await webR.FS.writeFile(file.name, data);
            output.innerText += `\n[System] File uploaded: ${file.name}. Use read.csv('${file.name}') to load it.`;
        };
        reader.readAsArrayBuffer(file);
    };
</script>

</body>
</html>
