<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebR Interactive Console</title>
    
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/r/r.min.js"></script>

    <style>
        :root { --bg: #1e1e1e; --border: #333; --accent: #3b82f6; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        .layout { display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Navigation Bar */
        header { background: #252526; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .controls { display: flex; gap: 10px; }
        
        /* Main Workspace */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* Left: Code Editor */
        .editor-pane { flex: 1; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .CodeMirror { flex: 1; font-size: 14px; background: #1e1e1e !important; }

        /* Right: Results */
        .output-pane { width: 40%; min-width: 350px; display: flex; flex-direction: column; background: #000; }
        #console { flex: 1; padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; color: #d1d1d1; overflow-y: auto; white-space: pre-wrap; border-bottom: 1px solid var(--border); }
        
        /* Plotting Area */
        #plot-area { height: 40%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; border-top: 4px solid var(--border); }
        canvas { max-width: 100%; max-height: 100%; background: white; }

        /* Buttons Styles */
        button { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; }
        button:hover:not(:disabled) { background: #2563eb; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-clear { background: #444; }
        .btn-clear:hover { background: #555; }

        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; display: inline-block; margin-right: 8px; }
        .ready #status-dot { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    </style>
</head>
<body class="loading">

<div class="layout">
    <header id="header">
        <div><span id="status-dot"></span> <strong>WebR Studio</strong></div>
        <div class="controls">
            <button id="run-btn" disabled>Run Code</button>
            <button id="clear-btn" class="btn-clear">Clear All</button>
        </div>
    </header>

    <div class="workspace">
        <div class="editor-pane">
            <textarea id="code-editor"># Enter your R code here and press the Run button to execute your code.</textarea>
        </div>
        
        <div class="output-pane">
            <div id="console">Initializing R WebAssembly engine...</div>
            <div id="plot-area">
                <canvas id="canvas" width="1000" height="1000"></canvas>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    // 1. Setup Editor
    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        mode: "r",
        theme: "dracula",
        lineNumbers: true,
        matchBrackets: true,
        autoCloseBrackets: true
    });

    const runBtn = document.getElementById('run-btn');
    const clearBtn = document.getElementById('clear-btn');
    const consoleDiv = document.getElementById('console');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const header = document.getElementById('header');

    // 2. Initialize WebR
    const webR = new WebR();
    
    async function start() {
        await webR.init();
        header.classList.add('ready');
        runBtn.disabled = false;
        consoleDiv.innerText = "R engine ready.\n";

        // Main Execution Logic
        const runR = async () => {
            runBtn.disabled = true;
            const code = editor.getValue();
            
            // Clear screen for new output
            consoleDiv.innerText += `\n> Running Selection...\n`;
            
            // Set R to use the canvas device
            await webR.evalR("options(device = webr::canvas)");

            try {
                const shelter = await new webR.Shelter();
                const result = await shelter.evalR(code);
                
                // Handle Text Output
                const output = await result.toJs();
                if (output.values) {
                    consoleDiv.innerText += output.values.join('\n') + '\n';
                }

                // HANDLE PLOTS (Critical Fix)
                // We must flush the event queue to see the graphics instructions
                const msgs = await webR.flush();
                msgs.forEach((msg) => {
                    if (msg.type === 'canvas' && msg.data.event === 'drawCanvas') {
                        // This actually draws the image object sent from R onto our HTML canvas
                        ctx.drawImage(msg.data.image, 0, 0);
                    }
                });

                await shelter.purge();
            } catch (err) {
                consoleDiv.innerText += `Error: ${err.message}\n`;
            } finally {
                runBtn.disabled = false;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
        };

        runBtn.onclick = runR;

        // Clear Everything
        clearBtn.onclick = () => {
            editor.setValue("# Enter your R code here and press the Run button to execute your code.");
            consoleDiv.innerText = "Console cleared.\n";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        // Support Ctrl+Enter
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runR();
        });
    }

    start();
</script>

</body>
</html>
