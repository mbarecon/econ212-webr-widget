<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>R Practice</title>

  <!-- DataCamp Light -->
  <script async src="https://cdn.datacamp.com/dcl-react.js.gz"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
    }

    .toolbar {
      margin-bottom: 12px;
    }

    .clear-btn {
      padding: 8px 14px;
      border: 1px solid #888;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .clear-btn:hover {
      background: #e9e9e9;
    }

    /* Hide raw exercise markup until DCL loads */
    [data-datacamp-exercise] {
      visibility: hidden;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button type="button" class="clear-btn" onclick="location.reload();">
      Clear
    </button>
  </div>

  <div
    id="r-practice"
    data-datacamp-exercise
    data-lang="r"
    data-height="600"
    data-show-run-button
    data-no-lazy-load
  >
    <code data-type="pre-exercise-code"></code>
    <code data-type="sample-code"></code>
  </div>

</body>
</html>
