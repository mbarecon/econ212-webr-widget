<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECON 212 webR Wid([github.com](https://github.com/mbarecon/webr-widget))    --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --success: #0f766e;
      --danger: #b91c1c;
      --editor-bg: #0f172a;
      --editor-text: #e5e7eb;
      --console-bg: #111827;
      --console-text: #d1fae5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    .status-bar {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 0.95rem;
      border: 1px solid #c7d2fe;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.15);
    }

    .status-dot.ready { background: #10b981; }
    .status-dot.error { background: #ef4444; }
    .status-dot.running { background: #2563eb; }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: #fafcff;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .panel-body {
      padding: 18px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #bfd0ea;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.08);
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    textarea {
      width: 100%;
      min-height: 460px;
      resize: vertical;
      border: 1px solid #1e293b;
      border-radius: 16px;
      background: var(--editor-bg);
      color: var(--editor-text);
      padding: 16px;
      font-family: "SFMono-Regular", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.95rem;
      line-height: 1.5;
      tab-size: 2;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .output-grid {
      display: grid;
      grid-template-rows: auto auto;
      gap: 20px;
    }

    pre {
      margin: 0;
      padding: 14px;
      min-height: 230px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--console-bg);
      color: var(--console-text);
      border-radius: 16px;
      font-family: "SFMono-Regular", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.92rem;
    }

    #plot {
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding: 12px;
      overflow: auto;
    }

    #plot canvas,
    #plot img,
    #plot svg {
      max-width: 100%;
      height: auto;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>R Practice</h1>
      <p class="subtitle">
        Write R code and run it directly in your browser with webR. This widget is designed for quick ECON 212 practice, including console output and basic plots.
      </p>
      <div class="status-bar">
        <div class="status-pill">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Loading webR...</span>
        </div>
      </div>
    </section>

    <main class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2>Editor</h2>
        </div>
        <div class="panel-body">
          <div class="controls">
            <button id="runBtn" class="primary" disabled>Run Code</button>
            <button id="resetBtn" disabled>Reset</button>
            <button id="clearBtn" disabled>Clear Output</button>
          </div>
          <textarea id="editor" spellcheck="false"></textarea>
          <p class="hint">Tip: edit the starter code, then click <strong>Run Code</strong>.</p>
        </div>
      </section>

      <section class="output-grid">
        <section class="panel">
          <div class="panel-header">
            <h2>Console</h2>
          </div>
          <div class="panel-body">
            <pre id="console">webR is starting…</pre>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Plot</h2>
          </div>
          <div class="panel-body">
            <div id="plot">
              <div class="empty-state">Run code that creates a plot to display it here.</div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <p class="footer-note">
      If you want stable deployments, pin a specific webR version instead of <code>latest</code> in the module URL.
    </p>
  </div>

  <script type="module">
    const starterCode = `# Basic summary statistics\nvalues <- c(12, 15, 14, 17, 19, 21, 18, 16)\n\nmean(values)\nsd(values)\n\n# Make a simple plot\nplot(values, type = \"b\", pch = 19, col = \"steelblue\",\n     main = \"Sample Data\", ylab = \"Value\", xlab = \"Observation\")`;

    const editor = document.getElementById('editor');
    const consoleEl = document.getElementById('console');
    const plotEl = document.getElementById('plot');
    const runBtn = document.getElementById('runBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    editor.value = starterCode;

    let webR;
    let shelter;
    let running = false;

    function setStatus(message, state = 'idle') {
      statusText.textContent = message;
      statusDot.className = `status-dot ${state}`.trim();
    }

    function appendConsole(message) {
      if (!message) return;
      consoleEl.textContent += `${consoleEl.textContent ? '\n' : ''}${message}`;
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function clearPlot() {
      plotEl.innerHTML = '<div class="empty-state">Run code that creates a plot to display it here.</div>';
    }

    function enableControls(enabled) {
      runBtn.disabled = !enabled || running;
      resetBtn.disabled = !enabled || running;
      clearBtn.disabled = !enabled || running;
    }

    function setRunning(isRunning) {
      running = isRunning;
      if (isRunning) {
        setStatus('Running R code...', 'running');
      }
      enableControls(!!webR);
    }

    async function initWebR() {
      try {
        setStatus('Loading webR...', 'running');
        consoleEl.textContent = 'Loading webR…';

        const { WebR } = await import('https://webr.r-wasm.org/latest/webr.mjs');
        webR = new WebR({
          stdout: line => appendConsole(line),
          stderr: line => appendConsole(line),
        });

        await webR.init();
        shelter = await new webR.Shelter();

        setStatus('webR is ready', 'ready');
        consoleEl.textContent = 'webR is ready. Click Run Code to begin.';
        enableControls(true);
      } catch (error) {
        consoleEl.textContent = `Failed to load webR.\n\n${error?.message || error}`;
        setStatus('webR failed to load', 'error');
      }
    }

    async function runCode() {
      if (!webR || running) return;

      setRunning(true);
      consoleEl.textContent = '';
      clearPlot();

      try {
        // Open a graphics device that renders into the page.
        await webR.evalRVoid(`grDevices::png(filename = "webr-plot.png", width = 900, height = 600)`);
        await shelter.captureR(editor.value, {
          withAutoprint: true,
        });
        await webR.evalRVoid('grDevices::dev.off()');

        const plotFile = await webR.FS.readFile('/home/web_user/webr-plot.png');
        if (plotFile && plotFile.length > 0) {
          const blob = new Blob([plotFile], { type: 'image/png' });
          const url = URL.createObjectURL(blob);
          plotEl.innerHTML = '';
          const img = document.createElement('img');
          img.src = url;
          img.alt = 'R plot output';
          plotEl.appendChild(img);
        } else {
          clearPlot();
        }

        if (!consoleEl.textContent.trim()) {
          consoleEl.textContent = '[No console output]';
        }

        setStatus('webR is ready', 'ready');
      } catch (error) {
        appendConsole(`\nError: ${error?.message || error}`);
        setStatus('Code execution failed', 'error');
      } finally {
        setRunning(false);
      }
    }

    runBtn.addEventListener('click', runCode);

    resetBtn.addEventListener('click', () => {
      editor.value = starterCode;
      setStatus(webR ? 'webR is ready' : 'Loading webR...', webR ? 'ready' : 'running');
    });

    clearBtn.addEventListener('click', () => {
      consoleEl.textContent = '';
      clearPlot();
      if (webR) setStatus('webR is ready', 'ready');
    });

    initWebR();
  </script>
</body>
</html>
