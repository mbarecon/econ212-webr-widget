<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebR Interactive Interface</title>
    
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/r/r.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #1e1e1e; color: white; overflow: hidden; }
        
        /* Layout like the Demo */
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; }
        
        .toolbar { background: #333; padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #444; }
        .status-indicator { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; background: #444; }
        .ready { color: #4ade80; border: 1px solid #4ade80; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* Left: Editor */
        .editor-pane { flex: 1; border-right: 1px solid #444; display: flex; flex-direction: column; }
        .CodeMirror { flex: 1; font-size: 14px; }

        /* Right: Output (Console & Plots) */
        .output-pane { width: 450px; display: flex; flex-direction: column; background: #000; }
        #console { flex: 1; padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; color: #d1d1d1; overflow-y: auto; white-space: pre-wrap; border-bottom: 1px solid #333; }
        #plot-area { height: 350px; background: white; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 100%; max-height: 100%; }

        /* Buttons */
        button { background: #3b82f6; color: white; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        button:hover { background: #2563eb; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="toolbar">
        <strong>WebR Session</strong>
        <span id="status" class="status-indicator">Initializing...</span>
        <button id="run-btn" disabled>Run (Ctrl+Enter)</button>
        <button id="clear-btn" class="btn-clear">Clear All</button>
    </div>

    <div class="workspace">
        <div class="editor-pane">
            <textarea id="code-editor"># Enter your R code here and press the Run button to execute your code.</textarea>
        </div>
        
        <div class="output-pane">
            <div id="console">Loading Web Assembly binaries...</div>
            <div id="plot-area">
                <canvas id="canvas" width="1008" height="1008"></canvas>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        mode: "r",
        theme: "dracula",
        lineNumbers: true,
        matchBrackets: true
    });

    const runBtn = document.getElementById('run-btn');
    const clearBtn = document.getElementById('clear-btn');
    const consoleDiv = document.getElementById('console');
    const statusSpan = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function init() {
        const webR = new WebR();
        await webR.init();
        
        statusSpan.innerText = "Ready";
        statusSpan.classList.add("ready");
        runBtn.disabled = false;
        consoleDiv.innerText = "R engine connected. System ready.\n";

        // Main Execution Logic
        const executeR = async () => {
            runBtn.disabled = true;
            const code = editor.getValue();
            
            // Clear previous plot for new run
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Tell R to use the HTML canvas for plotting
            await webR.evalR("options(device = webr::canvas)");

            try {
                const shelter = await new webR.Shelter();
                const result = await shelter.evalR(code);
                const output = await result.toJs();
                
                // Show console results
                if (output.values) {
                    consoleDiv.innerText += `> ${code.split('\n')[0]}...\n${output.values.join('\n')}\n`;
                }

                // PLOT HANDLING: Flush the message queue to draw the canvas
                const msgs = await webR.flush();
                msgs.forEach(msg => {
                    if (msg.type === 'canvas' && msg.data.event === 'drawCanvas') {
                        ctx.drawImage(msg.data.image, 0, 0);
                    }
                });

                await shelter.purge();
            } catch (err) {
                consoleDiv.innerText += `Error: ${err.message}\n`;
            } finally {
                runBtn.disabled = false;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }
        };

        runBtn.onclick = executeR;

        // Clear Functionality
        clearBtn.onclick = () => {
            editor.setValue("# Enter your R code here and press the Run button to execute your code.");
            consoleDiv.innerText = "Console cleared.\n";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        // Shortcut: Ctrl + Enter
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                executeR();
            }
        });
    }

    init();
</script>

</body>
</html>
