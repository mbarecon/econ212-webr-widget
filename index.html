<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>webR Widget</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.4;
    }
    textarea {
      width: 100%;
      height: 260px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      padding: 12px;
      box-sizing: border-box;
    }
    button {
      padding: 10px 14px;
      margin: 10px 10px 10px 0;
      cursor: pointer;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 12px;
      min-height: 120px;
      white-space: pre-wrap;
    }
    #plots canvas {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 12px 0;
      border: 1px solid #ddd;
    }
    .muted {
      color: #666;
    }
  </style>
</head>
<body>
  <h1>webR Widget</h1>
  <p class="muted">Run R code directly in the browser.</p>

  <textarea id="code">x <- c(12, 15, 14, 17, 19, 21, 18, 16)

mean(x)
sd(x)

plot(x, type = "b", pch = 19, main = "Sample Plot")</textarea>

  <div>
    <button id="run">Run Code</button>
    <button id="clear">Clear Output</button>
  </div>

  <h2>Console</h2>
  <pre id="output">Loading webR...</pre>

  <h2>Plots</h2>
  <div id="plots"></div>

  <script type="module">
    import { WebR, ChannelType } from "https://webr.r-wasm.org/latest/webr.mjs";

    const output = document.getElementById("output");
    const plots = document.getElementById("plots");
    const codeBox = document.getElementById("code");
    const runBtn = document.getElementById("run");
    const clearBtn = document.getElementById("clear");

    let webR;

    function setOutput(text) {
      output.textContent = text;
    }

    function clearPlots() {
      plots.innerHTML = "";
    }

    async function init() {
      try {
        webR = new WebR({
          channelType: ChannelType.PostMessage
        });
        await webR.init();
        setOutput("webR ready.");
        runBtn.disabled = false;
      } catch (err) {
        setOutput("Failed to load webR:\n\n" + err);
      }
    }

    async function runCode() {
      runBtn.disabled = true;
      setOutput("Running...");
      clearPlots();

      let shelter;
      try {
        shelter = await new webR.Shelter();

        const result = await shelter.captureR(codeBox.value, {
          captureGraphics: {
            width: 700,
            height: 500,
            bg: "white"
          },
          withAutoprint: true
        });

        const text = result.output
          .map(item => typeof item.data === "string" ? item.data : `[${item.type}]`)
          .join("\n");

        setOutput(text || "[No console output]");

        for (const img of result.images) {
          const canvas = document.createElement("canvas");
          canvas.width = img.width;
          canvas.height = img.height;
          canvas.getContext("2d").drawImage(img, 0, 0);
          plots.appendChild(canvas);
        }
      } catch (err) {
        setOutput("Execution error:\n\n" + err);
      } finally {
        if (shelter) shelter.purge();
        runBtn.disabled = false;
      }
    }

    runBtn.disabled = true;
    runBtn.addEventListener("click", runCode);
    clearBtn.addEventListener("click", () => {
      setOutput("");
      clearPlots();
    });

    init();
  </script>
</body>
</html>
