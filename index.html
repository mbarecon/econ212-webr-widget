<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>webR IDE</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182d;
      --panel-2: #161f38;
      --border: #24304d;
      --text: #e6edf7;
      --muted: #94a3b8;
      --accent: #6ea8fe;
      --accent-2: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --console-bg: #0a0f1d;
      --editor-bg: #0e1528;
      --plot-bg: #ffffff;
      --shadow: 0 8px 30px rgba(0,0,0,0.35);
      --radius: 14px;
      --header-height: 62px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at top, #16213f 0%, #0b1020 45%, #070b16 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(8, 12, 24, 0.72);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 8px 20px rgba(37,99,235,0.35);
      font-weight: 800;
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      margin-top: 1px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-2), #2563eb);
      color: white;
      box-shadow: 0 10px 24px rgba(37,99,235,0.28);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.02);
      border-color: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.06);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 1.05fr) minmax(320px, 0.95fr);
      gap: 16px;
      padding: 16px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: linear-gradient(180deg, rgba(22,31,56,0.96), rgba(13,18,33,0.96));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      min-height: 54px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 16px 0 0 #10b981, 32px 0 0 #ef4444;
      margin-right: 30px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .editor-wrap {
      background: var(--editor-bg);
      flex: 1;
      min-height: 0;
    }

    #editor {
      width: 100%;
      height: 100%;
      min-height: 360px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tab-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      padding: 8px 12px;
      border-radius: 9px;
      font-size: 13px;
    }

    .tab-btn.active {
      color: var(--text);
      background: rgba(110,168,254,0.12);
      border-color: rgba(110,168,254,0.18);
    }

    .right-content {
      flex: 1;
      min-height: 0;
      position: relative;
      background: var(--console-bg);
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
      min-height: 0;
    }

    .tab-panel.active {
      display: flex;
      flex-direction: column;
    }

    #consolePanel {
      background: var(--console-bg);
    }

    #console {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      color: #dbe7ff;
    }

    .console-line.stderr,
    .console-line.error,
    .console-line.warning {
      color: #fca5a5;
    }

    .console-line.message {
      color: #c4b5fd;
    }

    .console-line.prompt {
      color: #7dd3fc;
    }

    #plotsPanel {
      background: #0b1224;
      overflow: auto;
    }

    .plot-stack {
      display: grid;
      gap: 14px;
      padding: 16px;
      align-content: start;
    }

    .plot-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
    }

    .plot-card canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: var(--plot-bg);
      border-radius: 8px;
      margin: 0 auto;
    }

    .empty-state {
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 28px;
      font-size: 14px;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      font-size: 12px;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .status-indicator {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 6px rgba(245,158,11,0.12);
      flex: 0 0 auto;
    }

    .status-indicator.ready {
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(34,197,94,0.12);
    }

    .status-indicator.error {
      background: var(--danger);
      box-shadow: 0 0 0 6px rgba(239,68,68,0.12);
    }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      padding: 2px 7px;
      color: var(--text);
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      #editor {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">R</div>
      <div>
        webR IDE
        <small>R in the browser</small>
      </div>
    </div>
    <div class="actions">
      <button id="runBtn" class="btn-primary" disabled>Run</button>
      <button id="clearBtn" class="btn-secondary">Clear</button>
    </div>
  </header>

  <main class="workspace">
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span> Editor</div>
        <div class="hint">Run with <span class="kbd">Shift</span> + <span class="kbd">Enter</span></div>
      </div>
      <div class="editor-wrap">
        <div id="editor"></div>
      </div>
      <div class="statusbar">
        <div class="status-left">
          <div id="statusDot" class="status-indicator"></div>
          <div id="statusText">Loading webR...</div>
        </div>
        <div>Channel: GitHub Pages safe</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="tabs">
          <button class="tab-btn active" data-tab="console">Console</button>
          <button class="tab-btn" data-tab="plots">Plots</button>
        </div>
        <div class="hint">Output updates after each run</div>
      </div>
      <div class="right-content">
        <div id="consolePanel" class="tab-panel active">
          <div id="console"></div>
        </div>
        <div id="plotsPanel" class="tab-panel">
          <div id="plotStack" class="plot-stack">
            <div id="plotEmpty" class="empty-state">Plots will appear here when your R code creates graphics.</div>
          </div>
        </div>
      </div>
      <div class="statusbar">
        <div>webR output</div>
        <div id="runMeta">Idle</div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module">
    import { WebR, ChannelType } from 'https://webr.r-wasm.org/latest/webr.mjs';

    let webR = null;
    let editor = null;
    let ready = false;
    let running = false;

    const starterCode = `# Example code
x <- rnorm(1000)
summary(x)
hist(x, col = "#60a5fa", border = "white", main = "Histogram of x")`;

    const consoleEl = document.getElementById('console');
    const plotStack = document.getElementById('plotStack');
    const plotEmpty = document.getElementById('plotEmpty');
    const runBtn = document.getElementById('runBtn');
    const clearBtn = document.getElementById('clearBtn');
    const runMeta = document.getElementById('runMeta');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    function initEditor() {
      editor = ace.edit('editor');
      editor.setTheme('ace/theme/tomorrow_night_bright');
      editor.session.setMode('ace/mode/r');
      editor.session.setUseSoftTabs(true);
      editor.session.setTabSize(2);
      editor.setShowPrintMargin(false);
      editor.setHighlightActiveLine(true);
      editor.setValue(starterCode, -1);
      editor.commands.addCommand({
        name: 'runCode',
        bindKey: { win: 'Shift-Enter', mac: 'Shift-Enter' },
        exec: () => runCode(),
      });
    }

    function setStatus(message, state = 'loading') {
      statusText.textContent = message;
      statusDot.classList.remove('ready', 'error');
      if (state === 'ready') statusDot.classList.add('ready');
      if (state === 'error') statusDot.classList.add('error');
    }

    function appendConsole(text, cls = '') {
      const line = document.createElement('div');
      line.className = `console-line ${cls}`.trim();
      line.textContent = text;
      consoleEl.appendChild(line);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function clearConsole() {
      consoleEl.replaceChildren();
    }

    function clearPlots() {
      plotStack.replaceChildren();
      plotStack.appendChild(plotEmpty);
    }

    function clearAll() {
      editor.setValue('', -1);
      clearConsole();
      clearPlots();
      runMeta.textContent = 'Cleared';
      activateTab('console');
    }

    function activateTab(name) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === name);
      });
      document.getElementById('consolePanel').classList.toggle('active', name === 'console');
      document.getElementById('plotsPanel').classList.toggle('active', name === 'plots');
    }

    function showPlots(images) {
      plotStack.replaceChildren();
      if (!images || images.length === 0) {
        plotStack.appendChild(plotEmpty);
        return;
      }

      images.forEach((img) => {
        const card = document.createElement('div');
        card.className = 'plot-card';
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, img.width, img.height);
        card.appendChild(canvas);
        plotStack.appendChild(card);
      });
    }

    async function drawFlushedCanvasMessages() {
      const flushed = await webR.flush();
      const images = [];
      flushed.forEach(msg => {
        if (msg.type === 'canvas' && msg.data && msg.data.event === 'canvasImage') {
          images.push(msg.data.image);
        }
      });
      if (images.length > 0) {
        plotStack.replaceChildren();
        images.forEach((img) => {
          const card = document.createElement('div');
          card.className = 'plot-card';
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          canvas.getContext('2d').drawImage(img, 0, 0);
          card.appendChild(canvas);
          plotStack.appendChild(card);
        });
        activateTab('plots');
      }
    }

    async function initWebR() {
      try {
        setStatus('Loading webR...', 'loading');
        webR = new WebR({
          channelType: ChannelType.PostMessage,
          interactive: false,
        });
        await webR.init();
        await webR.evalRVoid('options(device = webr::canvas)');
        ready = true;
        runBtn.disabled = false;
        setStatus('webR ready', 'ready');
        appendConsole('webR ready. Run some R code.', 'message');
      } catch (err) {
        ready = false;
        runBtn.disabled = true;
        setStatus(`Failed to load webR: ${err.message}`, 'error');
        appendConsole(`Initialization error: ${err.message}`, 'error');
      }
    }

    async function runCode() {
      if (!ready || running) return;

      const code = editor.getValue();
      if (!code.trim()) {
        appendConsole('Nothing to run.', 'warning');
        return;
      }

      running = true;
      runBtn.disabled = true;
      runMeta.textContent = 'Running...';
      setStatus('Running R code...', 'loading');
      clearConsole();
      clearPlots();
      activateTab('console');
      appendConsole('> Running code...', 'prompt');

      let shelter = null;
      try {
        shelter = await new webR.Shelter();
        const capture = await shelter.captureR(code, {
          withAutoprint: true,
        });

        if (capture.output.length === 0) {
          appendConsole('[no console output]');
        } else {
          for (const item of capture.output) {
            const type = item.type || '';
            const text = typeof item.data === 'string' ? item.data : JSON.stringify(item.data);
            appendConsole(text, type);
          }
        }

        if (capture.images && capture.images.length > 0) {
          showPlots(capture.images);
          activateTab('plots');
        } else {
          await drawFlushedCanvasMessages();
        }

        const plotCount = document.querySelectorAll('.plot-card').length;
        runMeta.textContent = plotCount > 0 ? `Done · ${plotCount} plot${plotCount === 1 ? '' : 's'}` : 'Done';
        setStatus('webR ready', 'ready');
      } catch (err) {
        appendConsole(`Error: ${err.message}`, 'error');
        runMeta.textContent = 'Error';
        setStatus('Execution error', 'error');
      } finally {
        if (shelter) shelter.purge();
        running = false;
        runBtn.disabled = !ready;
        if (ready && statusText.textContent === 'Execution error') {
          // keep error status until next successful run
        } else if (ready) {
          setStatus('webR ready', 'ready');
        }
      }
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => activateTab(btn.dataset.tab));
    });

    runBtn.addEventListener('click', runCode);
    clearBtn.addEventListener('click', clearAll);

    initEditor();
    initWebR();
  </script>
</body>
</html>
