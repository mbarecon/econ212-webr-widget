<script type="module">
  import { WebR } from "https://webr.r-wasm.org/latest/webr.mjs";

  const statusEl = document.getElementById("status");
  const codeEl = document.getElementById("code");
  const consoleEl = document.getElementById("console");
  const plotEl = document.getElementById("plot");
  const runBtn = document.getElementById("runBtn");
  const resetBtn = document.getElementById("resetBtn");
  const clearBtn = document.getElementById("clearBtn");

  const starterCode = codeEl.value;

  let webR;
  let shelter;

  function setStatus(message, isError = false) {
    statusEl.textContent = message;
    statusEl.style.background = isError ? "#fff1f1" : "#eef4ff";
    statusEl.style.color = isError ? "#a12b2b" : "#1f5fb8";
    statusEl.style.borderColor = isError ? "#f3c4c4" : "#cfe0ff";
  }

  function appendConsole(text) {
    consoleEl.textContent += text;
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  function clearOutput() {
    consoleEl.textContent = "";
    plotEl.innerHTML = "";
  }

  function drawCapturedImages(images) {
    plotEl.innerHTML = "";

    if (!images || !images.length) {
      plotEl.innerHTML = '<p class="subtle">No plot was produced in this run.</p>';
      return;
    }

    images.forEach((image, index) => {
      const canvas = document.createElement("canvas");
      canvas.width = image.width;
      canvas.height = image.height;
      canvas.style.maxWidth = "100%";
      canvas.style.height = "auto";
      canvas.style.display = "block";
      if (index > 0) canvas.style.marginTop = "16px";

      const ctx = canvas.getContext("2d");
      ctx.drawImage(image, 0, 0);
      plotEl.appendChild(canvas);
    });
  }

  async function initWebR() {
    try {
      webR = new WebR();
      await webR.init();
      shelter = new webR.Shelter();

      setStatus("WebR is ready.");
      runBtn.disabled = false;
      resetBtn.disabled = false;
      clearBtn.disabled = false;
    } catch (error) {
      console.error(error);
      setStatus("WebR failed to load. Refresh the page and check the browser console.", true);
      appendConsole(`Error loading WebR:\n${error.message}\n`);
    }
  }

  async function runCode() {
    if (!webR || !shelter) return;

    runBtn.disabled = true;
    setStatus("Running R code...");
    clearOutput();

    try {
      const result = await shelter.captureR(
        `webr::canvas()
${codeEl.value}
dev.off()`,
        {
          withAutoprint: true,
          captureStreams: true,
          captureConditions: false,
          captureGraphics: true
        }
      );

      if (result.output && result.output.length) {
        result.output.forEach((msg) => {
          if (msg.type === "stdout" || msg.type === "stderr") {
            appendConsole(String(msg.data));
          }
        });
      }

      drawCapturedImages(result.images);
      setStatus("Run complete.");
    } catch (error) {
      console.error(error);
      appendConsole(`\nError:\n${error.message}\n`);
      setStatus("Run failed.", true);
    } finally {
      runBtn.disabled = false;
    }
  }

  runBtn.addEventListener("click", runCode);

  clearBtn.addEventListener("click", () => {
    clearOutput();
    setStatus("Output cleared.");
  });

  resetBtn.addEventListener("click", () => {
    codeEl.value = starterCode;
    clearOutput();
    setStatus("Editor reset to starter code.");
  });

  initWebR();
</script>
